version: '3.8'

services:
  # Caching State Layer
  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Historical Audit Storage Layer
  postgres:
    image: postgres:15-alpine
    container_name: rate-limiter-db
    environment:
      POSTGRES_DB: limiter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d limiter"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Rate Limiter Service Instance 1
  rate-limiter-1:
    build: .
    container_name: rate-limiter-node-1
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/limiter
      NODE_ENV: production
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Rate Limiter Service Instance 2
  rate-limiter-2:
    build: .
    container_name: rate-limiter-node-2
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/limiter
      NODE_ENV: production
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Rate Limiter Service Instance 3
  rate-limiter-3:
    build: .
    container_name: rate-limiter-node-3
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/limiter
      NODE_ENV: production
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Upstream Cluster Load Balancer
  nginx:
    image: nginx:alpine
    container_name: rate-limiter-nginx
    ports:
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rate-limiter-1
      - rate-limiter-2
      - rate-limiter-3

  # Metrics Scraper
  prometheus:
    image: prom/prometheus:latest
    container_name: rate-limiter-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # Metrics Dashboard UI
  grafana:
    image: grafana/grafana:latest
    container_name: rate-limiter-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
